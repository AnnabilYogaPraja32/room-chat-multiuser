<div class="app-container">

    <div id="chat-box">
        <div class="msg"><b>Sistem</b> Selamat datang di ruang chat, <?php echo $nama_user; ?>!</div>
    </div>

    <div id="typing-status"><?php echo $nama_user; ?> sedang mengetik...</div>

    <div class="input-group">
        <input type="file" id="file-input" accept="image/*,video/*,.pdf,.doc" style="display:none" onchange="handleFileSelect()">
        <button class="btn-icon" onclick="document.getElementById('file-input').click()" title="Kirim File">📎</button>
        
        <input type="text" id="message-input" placeholder="Tulis pesan..." oninput="showTyping()" onkeypress="handleKeyPress(event)">
        
        <button class="btn-send" onclick="sendMessage()">Kirim</button>
    </div>
</div>

<script>
    const userName = "<?php echo $nama_user; ?>";
    let typingTimer;

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (input.value.trim() !== "") {
            displayMessage(userName, input.value, 'text', true);
            input.value = ""; 
            document.getElementById('typing-status').style.opacity = "0";
        }
    }

    function getTime() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ":" + 
               now.getMinutes().toString().padStart(2, '0');
    }

    function showTyping() {
        const status = document.getElementById('typing-status');
        status.style.opacity = "1";
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => { status.style.opacity = "0"; }, 2000);
    }

    function handleFileSelect() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                let type = 'file';
                if(file.type.startsWith('image')) type = 'image';
                else if(file.type.startsWith('video')) type = 'video';
                
                displayMessage(userName, e.target.result, type, true, file.name);
            };
            reader.readAsDataURL(file);
            fileInput.value = "";
        }
    }

    function displayMessage(sender, content, type, isSelf, fileName = "") {
        const chatBox = document.getElementById('chat-box');
        const newMsg = document.createElement('div');
        newMsg.className = isSelf ? 'msg self' : 'msg';
        
        let htmlContent = `<b>${sender}</b>`;
        if (type === 'text') htmlContent += content;
        else if (type === 'image') htmlContent += `<img src="${content}">`;
        else if (type === 'video') htmlContent += `<video src="${content}" controls></video>`;
        else if (type === 'file') htmlContent += `📄 <a href="${content}" download="${fileName}" style="color: inherit;">${fileName}</a>`;
        
        htmlContent += `<span class="timestamp">${getTime()}</span>`;
        newMsg.innerHTML = htmlContent;
        chatBox.appendChild(newMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
</script>

</body>
